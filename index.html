<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <header>
        <nav class="h-[90px] bg-[#29ABE2] text-amber-50 px-2 fixed top-0 right-0 left-0 z-20">
            <ul class="flex justify-between list-none p-7 items-center">
                <li>
                    <h2 class="font-bold text-2xl"><a href="">MedCollab</a></h2>
                </li>
                <li class="flex gap-10 justify-center items-center text-lg">
                    <div><a href="">Sevices</a></div>
                    <div><a href="">About</a></div>
                    <div><i class="fa-solid fa-arrow-up-from-bracket"></i><a href="">&nbsp;Upload</a></div>
                    <div><i class="fa-solid fa-user-plus"></i><a href="">&nbsp;Signup</a></div>

                    <button class="cursor-pointer w-60 h-10 rounded-3xl text-[#29ABE2] text-xl whitespace-nowrap bg-amber-50">Book Appointment</button>

    <!--services start-->
    <main>
